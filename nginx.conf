# Nginx Configuration for COSMAN Production Deployment

server {
    listen 80;
    listen [::]:80;
    server_name cosman.com www.cosman.com;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://cosman.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cosman.com;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/cosman.com.crt;
    ssl_certificate_key /etc/ssl/private/cosman.com.key;

    # Canonical redirect from www.cosman.com to cosman.com
    return 301 https://cosman.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cosman.com;

    root /usr/share/nginx/html;
    index index.html;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/cosman.com.crt;
    ssl_certificate_key /etc/ssl/private/cosman.com.key;

    # Strong SSL Hardening Protocols & Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Note: Brotli is recommended for maximum performance but requires custom dynamic nginx module compilation.
    # To enable: brotli on; brotli_types text/plain text/css application/json application/javascript text/xml;

    # Robust Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com;" always;

    # Log Locations
    access_log /var/log/nginx/cosman_access.log;
    error_log /var/log/nginx/cosman_error.log warn;

    # Static Assets - Long-term Cache
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # HTML Pages - Balanced Validation Caching
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Service Worker - Strictly Never Cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # SPA Router Handling and fallback routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fallback configuration for missing files inside Nginx routing
    error_page 404 /index.html;
}
