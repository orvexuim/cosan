version: '3.9'

# ─────────────────────────────────────────────────────
#   COSMAN — Full-Stack Docker Compose
#   Services: frontend (nginx), backend (node), db (postgres), cache (redis)
#   Usage:
#     Development:  docker-compose --profile dev up
#     Production:   docker-compose --profile prod up -d
# ─────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cosman-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cosman}
      POSTGRES_USER:     ${POSTGRES_USER:-cosman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?DB password required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - cosman-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cosman}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cosman-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-cosmanredis}
    ports:
      - "6379:6379"
    networks:
      - cosman-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node.js Backend API ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosman-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:             production
      PORT:                 5000
      DATABASE_URL:         postgresql://${POSTGRES_USER:-cosman}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cosman}
      REDIS_URL:            redis://:${REDIS_PASSWORD:-cosmanredis}@redis:6379
      JWT_SECRET:           ${JWT_SECRET:?Required}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET:?Required}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:   ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST:            ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_USER:            ${SMTP_USER:-}
      SMTP_PASS:            ${SMTP_PASS:-}
      STRIPE_SECRET_KEY:    ${STRIPE_SECRET_KEY:-}
      PAYPAL_CLIENT_ID:     ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
    ports:
      - "5000:5000"
    networks:
      - cosman-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Frontend (production) ──────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosman-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/ssl/certs:ro
      - ssl-private:/etc/ssl/private:ro
    networks:
      - cosman-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles: [prod]

  # ── Watchtower (auto-updates in prod) ────────────
  watchtower:
    image: containrrr/watchtower
    container_name: cosman-updater
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --label-enable
    restart: unless-stopped
    networks:
      - cosman-net
    profiles: [prod]

networks:
  cosman-net:
    driver: bridge

volumes:
  pgdata:
    name: cosman-pgdata
  ssl-certs:
    external: true
    name: cosman-ssl-certs
  ssl-private:
    external: true
    name: cosman-ssl-private
