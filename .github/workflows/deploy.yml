name: 'COSMAN — Deploy to Production'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate HTML Files Exist
        run: |
          echo "Checking core HTML files..."
          required_files=("index.html" "shop.html" "product.html" "cart.html" "auth.html" "admin.html" "brand-guide.html")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file is missing"
              exit 1
            fi
          done

      - name: Check for Broken Placeholder Links
        run: |
          echo "Searching for href='#' placeholder links..."
          placeholders=$(grep -rn "href=['\"]#['\"]" ./*.html || true)
          if [ -n "$placeholders" ]; then
            echo "::warning::Found placeholder links that should be updated before production:"
            echo "$placeholders"
          else
            echo "✓ No placeholder links found."
          fi

      - name: Validate manifest.json is Valid JSON
        run: |
          if [ -f "manifest.json" ]; then
            python3 -m json.tool manifest.json > /dev/null
            echo "✓ manifest.json is valid JSON"
          else
            echo "✗ manifest.json does not exist"
            exit 1
          fi

      - name: Check Service Worker exists
        run: |
          if [ -f "sw.js" ]; then
            echo "✓ sw.js exists"
          else
            echo "✗ sw.js is missing"
            exit 1
          fi

  deploy-preview:
    name: Deploy Preview (Vercel)
    needs: quality-check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **COSMAN Deployment Preview Ready!**\n\nPreview Link: [${url}](${url})\n\n_Built with GitHub Actions and Vercel CLI._`
            })

  deploy-production:
    name: Deploy Production (Vercel)
    needs: quality-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Production to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Success Notification
        run: echo "🎉 COSMAN production deploy complete and active on Vercel CDN!"
