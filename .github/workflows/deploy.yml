name: COSMAN — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Quality & Security Checks ────────────
  quality-check:
    name: Quality & Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify frontend pages exist
        run: |
          echo "Checking frontend pages..."
          for f in index.html shop.html product.html cart.html auth.html admin.html; do
            [ -f "frontend/$f" ] && echo "✓ $f" || { echo "✗ MISSING: $f"; exit 1; }
          done

      - name: Validate manifest.json
        run: python3 -m json.tool frontend/manifest.json > /dev/null && echo "✓ manifest.json valid"

      - name: Validate vercel.json
        run: python3 -m json.tool vercel.json > /dev/null && echo "✓ vercel.json valid"

      - name: Check service worker
        run: |
          [ -f frontend/sw.js ] && echo "✓ sw.js present" || { echo "✗ sw.js missing"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend (if eslint config exists)
        working-directory: backend
        run: npx eslint src/ --ext .js --max-warnings 50 || echo "Lint skipped (no config)"

      - name: Validate Prisma schema
        working-directory: backend
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run backend unit tests
        working-directory: backend
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci
          REDIS_URL: redis://localhost:6379
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          SMTP_HOST: smtp.test.com
          SMTP_PORT: '587'
          SMTP_USER: test@test.com
          SMTP_PASS: test
          STRIPE_SECRET_KEY: sk_test_dummy
          PAYPAL_CLIENT_ID: test
          PAYPAL_CLIENT_SECRET: test

  # ── Job 2: Build Docker image ────────────────────
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=git-
            type=raw,value=latest

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 3: Deploy preview (PRs only) ────────────
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy preview to Vercel
        id: vercel-preview
        run: |
          PREVIEW_URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 COSMAN Preview Deployed\n\n**Preview URL:** ${{ steps.vercel-preview.outputs.preview_url }}\n\n*Auto-deployed by Vesper AI · COSMAN CI/CD*`
            })

  # ── Job 4: Deploy production (main only) ────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-check, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://cosman.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy frontend to Vercel (production)
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify deployment success
        run: |
          echo "✅ COSMAN deployed to production"
          echo "   Frontend: https://cosman.com"
          echo "   Backend:  https://api.cosman.com"
          echo "   Commit:   ${{ github.sha }}"
